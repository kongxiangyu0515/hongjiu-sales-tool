<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>红酒私域销售话术助手</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">🍷</span>
                    <h1>红酒私域销售话术助手</h1>
                </div>
                <div class="header-actions">
                    <button id="favorites-btn" class="btn btn-secondary">
                        <span class="icon">❤️</span>
                        收藏夹
                        <span id="favorites-count" class="badge">0</span>
                    </button>
                </div>
            </div>
        </header>

        <div class="tab-container">
            <button class="tab-btn active" data-tab="generator">话术生成器</button>
            <button class="tab-btn" data-tab="library">话术库</button>
        </div>

        <div class="tab-content">
            <div id="generator-tab" class="tab-panel active">
                <div class="generator-container">
                    <div class="input-section">
                        <h2>客户信息</h2>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label>客户身份</label>
                                <select id="customer-type">
                                    <option value="">请选择客户身份</option>
                                    <option value="自饮">自饮</option>
                                    <option value="送礼">送礼</option>
                                    <option value="宴请">宴请</option>
                                    <option value="企业采购">企业采购</option>
                                    <option value="新手入门">新手入门</option>
                                    <option value="老客户复购">老客户复购</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>客户关系</label>
                                <select id="relationship">
                                    <option value="">请选择客户关系</option>
                                    <option value="朋友">朋友</option>
                                    <option value="领导">领导</option>
                                    <option value="长辈">长辈</option>
                                    <option value="客户">客户</option>
                                    <option value="伴侣">伴侣</option>
                                    <option value="同事">同事</option>
                                    <option value="自己">自己</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>预算区间</label>
                                <select id="budget">
                                    <option value="">请选择预算区间</option>
                                    <option value="100以内">100以内</option>
                                    <option value="100-300">100-300</option>
                                    <option value="300-500">300-500</option>
                                    <option value="500-1000">500-1000</option>
                                    <option value="1000以上">1000以上</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>客户顾虑</label>
                                <select id="concern">
                                    <option value="">请选择客户顾虑（可选）</option>
                                    <option value="怕买贵">怕买贵</option>
                                    <option value="怕不懂">怕不懂</option>
                                    <option value="怕送礼没面子">怕送礼没面子</option>
                                    <option value="怕太酸涩">怕太酸涩</option>
                                    <option value="怕不好入口">怕不好入口</option>
                                    <option value="怕对方不喜欢">怕对方不喜欢</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>口味偏好</label>
                                <select id="flavor">
                                    <option value="">请选择口味偏好（可选）</option>
                                    <option value="果香明显">果香明显</option>
                                    <option value="柔顺好入口">柔顺好入口</option>
                                    <option value="干型">干型</option>
                                    <option value="微甜">微甜</option>
                                    <option value="厚重">厚重</option>
                                    <option value="适合配餐">适合配餐</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>销售目标</label>
                                <select id="goal">
                                    <option value="">请选择销售目标</option>
                                    <option value="建立信任">建立信任</option>
                                    <option value="推荐单品">推荐单品</option>
                                    <option value="处理异议">处理异议</option>
                                    <option value="促成下单">促成下单</option>
                                    <option value="引导复购">引导复购</option>
                                </select>
                            </div>
                        </div>

                        <button id="generate-btn" class="btn btn-primary btn-large">生成话术</button>

                        <div class="examples-section">
                            <h3>快速模板</h3>
                            <div class="examples-grid">
                                <button class="example-btn" data-example="ex1">🎁 送领导</button>
                                <button class="example-btn" data-example="ex2">👴 送长辈</button>
                                <button class="example-btn" data-example="ex3">💑 情侣约会</button>
                                <button class="example-btn" data-example="ex4">💼 商务宴请</button>
                                <button class="example-btn" data-example="ex5">🍷 新手自饮</button>
                                <button class="example-btn" data-example="ex6">🔄 老客户复购</button>
                                <button class="example-btn" data-example="ex7">💰 客户嫌贵</button>
                                <button class="example-btn" data-example="ex8">🤔 客户说不懂</button>
                                <button class="example-btn" data-example="ex9">👨‍👩‍👧 家庭聚会</button>
                                <button class="example-btn" data-example="ex10">🏢 企业年会</button>
                            </div>
                        </div>
                    </div>

                    <div class="output-section">
                        <div id="result-container" class="result-container hidden">
                            <div class="result-header-actions">
                                <button id="copy-all-btn" class="btn btn-primary btn-large">📋 复制整套话术</button>
                            </div>
                            <div class="result-card">
                                <div class="result-header">
                                    <h3>客户心理判断</h3>
                                    <button class="copy-btn" data-target="psychological-judgment">复制</button>
                                </div>
                                <p id="psychological-judgment"></p>
                            </div>

                            <div class="result-card">
                                <div class="result-header">
                                    <h3>销售切入点</h3>
                                    <button class="copy-btn" data-target="entry-point">复制</button>
                                </div>
                                <p id="entry-point"></p>
                            </div>

                            <div class="result-card">
                                <div class="result-header">
                                    <h3>推荐逻辑</h3>
                                    <button class="copy-btn" data-target="recommendation-logic">复制</button>
                                </div>
                                <p id="recommendation-logic"></p>
                            </div>

                            <div class="result-card">
                                <div class="result-header">
                                    <h3>微信私聊话术</h3>
                                    <button class="copy-btn" data-target="wechat-script">复制</button>
                                </div>
                                <div id="wechat-script" class="script-content"></div>
                            </div>

                            <div class="result-card">
                                <div class="result-header">
                                    <h3>朋友圈版本</h3>
                                    <button class="copy-btn" data-target="moments-script">复制</button>
                                </div>
                                <div id="moments-script" class="script-content"></div>
                            </div>

                            <div class="result-card">
                                <div class="result-header">
                                    <h3>异议处理备用话术</h3>
                                    <button class="copy-btn" data-target="objection-handling">复制</button>
                                </div>
                                <p id="objection-handling"></p>
                            </div>

                            <div class="result-card">
                                <div class="result-header">
                                    <h3>下一步轻推进</h3>
                                    <button class="copy-btn" data-target="closing-line">复制</button>
                                </div>
                                <p id="closing-line"></p>
                            </div>
                        </div>

                        <div id="empty-state" class="empty-state">
                            <div class="empty-icon">📝</div>
                            <h3>选择客户信息，生成专属话术</h3>
                            <p>填写上方表单或点击快速模板，获取专业的红酒销售话术</p>
                        </div>
                    </div>
                </div>
            </div>

            <div id="library-tab" class="tab-panel">
                <div class="main-content">
                    <aside class="sidebar">
                        <div class="sidebar-header">
                            <h2>销售模块</h2>
                        </div>
                        <nav class="category-nav">
                            <ul>
                                <li>
                                    <button class="category-item active" data-category="all">
                                        <span class="category-icon">📋</span>
                                        全部话术
                                    </button>
                                </li>
                                <li>
                                    <button class="category-item" data-category="intro">
                                        <span class="category-icon">🤝</span>
                                        转介绍破冰
                                    </button>
                                </li>
                                <li>
                                    <button class="category-item" data-category="demand">
                                        <span class="category-icon">🎯</span>
                                        需求挖掘
                                    </button>
                                </li>
                                <li>
                                    <button class="category-item" data-category="entry">
                                        <span class="category-icon">🌟</span>
                                        入门款介绍
                                    </button>
                                </li>
                                <li>
                                    <button class="category-item" data-category="mid">
                                        <span class="category-icon">⚡</span>
                                        进阶款介绍
                                    </button>
                                </li>
                                <li>
                                    <button class="category-item" data-category="high">
                                        <span class="category-icon">💎</span>
                                        高端款介绍
                                    </button>
                                </li>
                                <li>
                                    <button class="category-item" data-category="knowledge">
                                        <span class="category-icon">📚</span>
                                        酒类知识
                                    </button>
                                </li>
                                <li>
                                    <button class="category-item" data-category="scene">
                                        <span class="category-icon">🎬</span>
                                        场景推荐
                                    </button>
                                </li>
                                <li>
                                    <button class="category-item" data-category="objection">
                                        <span class="category-icon">🛡️</span>
                                        异议处理
                                    </button>
                                </li>
                                <li>
                                    <button class="category-item" data-category="closing">
                                        <span class="category-icon">✅</span>
                                        促成成交
                                    </button>
                                </li>
                                <li>
                                    <button class="category-item" data-category="moments">
                                        <span class="category-icon">📱</span>
                                        朋友圈文案
                                    </button>
                                </li>
                            </ul>
                        </nav>
                    </aside>

                    <main class="content-area">
                        <div class="search-section">
                            <div class="search-box">
                                <span class="search-icon">🔍</span>
                                <input type="text" id="search-input" placeholder="搜索话术关键词，如：送礼、口感、价格...">
                                <button id="search-btn" class="search-btn">搜索</button>
                            </div>
                        </div>

                        <div class="tag-cloud-section">
                            <h4 class="tag-cloud-title">场景标签</h4>
                            <div id="tag-cloud" class="tag-cloud"></div>
                        </div>

                        <div class="results-header">
                            <h3 id="results-title">全部话术</h3>
                            <span id="results-count" class="results-count">共 0 条</span>
                        </div>

                        <div id="话术-list" class="话术-list">
                        </div>
                    </main>
                </div>
            </div>
        </div>

        <div id="detail-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modal-title">话术详情</h3>
                    <button id="close-modal" class="close-btn">×</button>
                </div>
                <div class="modal-body">
                    <div class="modal-category">
                        <span id="modal-category-tag" class="category-tag"></span>
                        <span id="modal-product-tag" class="product-tag"></span>
                    </div>
                    <div class="modal-scene">
                        <h4>使用场景</h4>
                        <p id="modal-scene"></p>
                    </div>
                    <div class="modal-content-text">
                        <h4>话术内容</h4>
                        <div id="modal-text" class="话术-content"></div>
                    </div>
                    <div class="modal-tips">
                        <h4>技巧要点</h4>
                        <ul id="modal-tips"></ul>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="modal-favorite-btn" class="btn btn-secondary">
                        <span class="icon">❤️</span>
                        <span id="favorite-text">收藏</span>
                    </button>
                    <button id="modal-copy-btn" class="btn btn-primary">
                        <span class="icon">📋</span>
                        复制话术
                    </button>
                </div>
            </div>
        </div>

        <div id="toast" class="toast">
            <span id="toast-message"></span>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
